# Local dev: Postgres + Dash app. Start with `make dev`.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vessel
      POSTGRES_PASSWORD: vessel
      POSTGRES_DB: vessel_valuation
    ports:
      - '5432:5432'
    volumes:
      - vessel_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vessel -d vessel_valuation']
      interval: 2s
      timeout: 5s
      retries: 15

  app:
    build: .
    ports:
      - '8050:8050'
    environment:
      DATABASE_URL: postgresql+psycopg2://vessel:vessel@db:5432/vessel_valuation
      PORT: '8050'
      DASH_DEBUG: '0'
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  vessel_postgres_data:
